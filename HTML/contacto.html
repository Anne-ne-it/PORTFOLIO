  <main>
    <section class="formulario-contacto">
      <h1>Contacto</h1>
      <p class="intro-contacto">¿Tienes alguna pregunta o propuesta? Rellena el formulario y me pondré en contacto contigo lo antes posible.</p>
      
      <div class="container-datos">
        <form class="grupo-persona" method="POST">
          <div class="grupo-datos">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
          </div>
          <div class="grupo-datos">
            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos" required> 
          </div>
          <div class="grupo-email">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="contacto@email.com" required>
          </div>
          <div class="grupo-asunto">
            <label for="asunto">Asunto</label>
            <input type="text" id="asunto" name="asunto" placeholder="Asunto del mensaje" required>
          </div>
          <div class="grupo-mensaje">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí..." required></textarea>
          </div>
    
          <button type="submit" class="boton-submit">Enviar mensaje</button>
          <button type="reset" class="boton-reset">Borrar</button>
        </form>
      </div>
    </section>
  </main>
